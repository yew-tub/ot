name: YewTuBot
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   NOSTR_PRIVATE_KEY   – Nostr nsec private key (nsec1... or hex)
#   SESSION_COOKIES     – Pre-authenticated session cookies from get-session.js
#
# Optional:
#   INVIDIOUS_INSTANCES – comma-separated list of Invidious instances (defaults to a curated set)

on:
  schedule:
    - cron: '*/7 * * * *'
  
  workflow_dispatch:
    inputs:
      rescan:
        description: 'Clear processed/commented state and rescan all posts'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Restore bot state
      uses: actions/cache/restore@v5
      with:
        path: .bot-state.json
        key: bot-state-${{ github.run_id }}
        restore-keys: |
          bot-state-
          
    - name: Run bot
      env:
        NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
        SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
        NODE_ENV: production
        DEBUG: 'true'
        BACKFILL: 'true'
        BACKFILL_DEPTH: ${{ inputs.rescan == 'true' && '50' || '10' }}
        RESCAN: ${{ inputs.rescan || 'false' }}
      run: npm start
        
    - name: Save bot state
      uses: actions/cache/save@v5
      if: always()
      with:
        path: .bot-state.json
        key: bot-state-${{ github.run_id }}
